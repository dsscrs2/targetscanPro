function switchToUser(id){App.switchUser(id);}
function addUser(){
  const name=prompt('Enter shooter name (max 20 chars):','');
  if(!name||!name.trim())return;
  if(Users.all.length>=Users.MAX){toast('Maximum 5 profiles reached');return;}
  const u=Users.add(name);
  if(u){Users.switchTo(u.id);App.switchUser(u.id);toast('Profile created: '+u.name);}
}
function renameUser(id,current){
  const name=prompt('New name for this profile:',current);
  if(!name||!name.trim())return;
  Users.rename(id,name);
  toast('Renamed to '+name.trim().slice(0,20));
  render();
}
function deleteUser(id,name){
  const uSessions=JSON.parse(localStorage.getItem('ts_sessions_'+id)||'[]');
  const msg=`Delete profile "${name}"?\n\nThis will permanently erase ${uSessions.length} session(s) and all progress.\n\nThis CANNOT be undone. Backup first!`;
  if(!confirm(msg))return;
  Users.del(id);
  if(Users.currentId===id||!Users.current)App.switchUser(Users.all[0]?.id||'');
  else{toast('Profile deleted');render();}
}
function exportUserData(id,name){
  const sessions=JSON.parse(localStorage.getItem('ts_sessions_'+id)||'[]');
  const prefs=JSON.parse(localStorage.getItem('ts_prefs_'+id)||'{}');
  const payload={version:1,exported:new Date().toISOString(),shooter:name,sessions,prefs};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const filename=`airscan_${name.replace(/\s+/g,'_')}_backup_${new Date().toISOString().slice(0,10)}.json`;
  const file=new File([blob],filename,{type:'application/json'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({title:`AirScan Backup — ${name}`,files:[file]}).catch(()=>_fallbackDl(URL.createObjectURL(blob),filename));
  } else {_fallbackDl(URL.createObjectURL(blob),filename);}
  toast('Backup saved for '+name+'!');
}

        style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:15px 18px;background:none;border:none;cursor:pointer;text-align:left;touch-action:manipulation;-webkit-tap-highlight-color:transparent">
        <span style="font-family:var(--body);font-size:.95rem;font-weight:600;color:${f.good?'var(--green)':'var(--text)'};line-height:1.4">${f.q}</span>
        <svg class="faq-arr" width="18" height="18" fill="none" stroke="var(--text3)" stroke-width="2" style="flex-shrink:0;transition:transform .2s"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div style="display:none;padding:0 18px 16px">
        <p style="color:var(--text2);font-size:.92rem;line-height:1.68">${f.a}</p>
      </div>
    </div>`).join('')}
  </div>

  <!-- Tips block -->
  <div style="margin:20px 18px 8px">
    <div class="slbl">PRO TIPS</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${[
        ['📸','Photography','Photograph at the range right after shooting — before the target is moved or folded. Hold the phone flat and parallel to the target for the most accurate ring measurements.'],
        ['🔍','Zoom in when placing','In the editor, always zoom to at least 200–300% before placing markers. Small placement errors compound across multiple shots and directly reduce score accuracy.'],
        ['👤','One profile per shooter','Even if only one person usually uses this device, set up a named profile. It keeps your data organised and makes backup/restore much cleaner.'],
        ['💾','Backup after every session','Export your backup from the Profiles page after each training session. Send it to yourself via email or WhatsApp — if the browser clears data you\'ll have everything safe.'],
        ['📲','Install the app','Add to Home Screen for the best experience — full screen, faster loading, and storage isolated from your browser\'s clear-data actions.'],
      ].map(([em,title,tip])=>`
      <div style="display:flex;gap:12px;padding:13px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)">
        <span style="font-size:1.3rem;flex-shrink:0;line-height:1.3">${em}</span>
        <div><div style="font-family:var(--head);font-size:.65rem;letter-spacing:.1em;color:var(--text);margin-bottom:4px">${title}</div><p style="color:var(--text2);font-size:.88rem;line-height:1.55">${tip}</p></div>
      </div>`).join('')}
    </div>
  </div>

  <div style="padding:20px 18px;text-align:center;color:var(--text4);font-family:var(--mono);font-size:.65rem;letter-spacing:.1em">
    AirScan Pro · Free For All by Dilan
  </div>
</div>`;
}
// ══════════════════════════════════════════════════════════════════
function renderNav(){
  const navViews=['home','results','history','progress','report','guide','profiles'];
  if(!navViews.includes(App.view))return'';
  const tabs=[
    {id:'home',   icon:`<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="2" y1="12" x2="7" y2="12"/><line x1="17" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="22"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/></svg>`, label:'SCAN'},
    {id:'results',icon:`<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`, label:'RESULTS'},
    {id:'history',icon:`<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`, label:'HISTORY'},
    {id:'progress',icon:`<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`, label:'STATS'},
    {id:'report', icon:`<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`, label:'REPORT'},
  ];
  return`<nav class="bottom-nav">${tabs.map(t=>{
    const isActive=App.view===t.id;
    const disabled=(t.id==='results'&&!App.results&&!App.viewSession)||(t.id==='progress'&&DB.sessions.filter(s=>s.stats).length<2)||(t.id==='report'&&DB.sessions.filter(s=>s.stats).length<3);
    return`<button class="nav-btn${isActive?' active':''}" ${disabled?'disabled style="opacity:.2;pointer-events:none"':''} onclick="navTo('${t.id}')">
      ${isActive?`<div class="nav-active-bar"></div>`:`<div style="height:3px"></div>`}
      ${t.icon}
      <span>${t.label}</span>
    </button>`;
  }).join('')}</nav>`;
}

// ══════════════════════════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  let html='';
  if(App.view==='home')       html=pgHome();
  else if(App.view==='camera')     html=pgCamera();
  else if(App.view==='configure')  html=pgConfigure();
  else if(App.view==='processing') html=pgProcessing();
  else if(App.view==='results')    html=pgResults(App.viewSession||App.results);
  else if(App.view==='history')    html=pgHistory();
  else if(App.view==='progress')   html=pgProgress();
  else if(App.view==='report')     html=pgReport();
  else if(App.view==='editor')     html=pgEditor();
  else if(App.view==='profiles')   html=pgProfiles();
  else if(App.view==='guide')      html=pgGuide();
  root.innerHTML=html+renderNav();
  // Inject AI report overlay on top if active
  if(App.showAIReport&&App.aiReport){
    const overlay=document.createElement('div');
    overlay.innerHTML=renderAIReportOverlay(App.aiReport,App.aiReportSession);
    const el=overlay.firstElementChild;
    if(el)document.body.appendChild(el);
  }
  if(App.view==='camera'){const v=document.getElementById('camvid');if(v&&App.stream)v.srcObject=App.stream;}
  if(App.view==='progress'){
    const ss=DB.sessions.filter(s=>s.stats&&s.scored?.length>0);
    requestAnimationFrame(()=>{
      drawTrendChart(document.getElementById('trend-chart'),ss);
      drawSpreadChart(document.getElementById('spread-chart'),ss);
      drawMPIChart(document.getElementById('mpi-chart'),ss);
    });
  }
  if(App.view==='editor'){
    requestAnimationFrame(()=>{
      const wrap=document.getElementById('ed-wrap');
      const canvas=document.getElementById('ed-canvas');
      if(!wrap||!canvas||!Ed.img)return;
      const dpr=window.devicePixelRatio||1;
      Ed.dpr=dpr;
      const w=wrap.clientWidth;
      const h=wrap.clientHeight;
      canvas.width=Math.round(w*dpr);
      canvas.height=Math.round(h*dpr);
      canvas.style.width=w+'px';
      canvas.style.height=h+'px';
      Ed.fit(canvas.width,canvas.height);
      Ed.redraw();
      setupEditorEvents();
    });
  }
}

// ══════════════════════════════════════════════════════════════════
//  HANDLERS
// ══════════════════════════════════════════════════════════════════
function navTo(id){App.setState({view:id,viewSession:null});}
function onFile(e){const f=e.target.files[0];if(!f)return;App.imgUrl=URL.createObjectURL(f);App.setState({view:'configure'});}
function runDemo(){const url=genDemo(8);App.imgUrl=url;runAnalysis(url);}

// Instant chip selection — no full re-render, just toggle classes + save
const CFG_GROUPS={
  type:['AIR_PISTOL_10M','AIR_RIFLE_10M','AIR_PISTOL_25M','FIELD_TARGET','HUNTER_FT','CUSTOM'],
  caliber:['.177 (4.5mm)','.22 (5.5mm)','.25 (6.35mm)','.20 (5mm)'],
  mode:['decimal','integer','field']
};
function setCfg(key,val){
  App.cfg[key]=val;
  App.saveCfg();
  // Update chip visuals instantly without re-rendering the page
  if(key==='type'){
    CFG_GROUPS.type.forEach(v=>{const el=document.getElementById(`cfg-type-${v}`);if(el)el.className='chip'+(v===val?' on':'');});
  } else if(key==='caliber'){
    CFG_GROUPS.caliber.forEach(v=>{const el=document.getElementById(`cfg-caliber-${v.replace(/[^a-z0-9]/gi,'_')}`);if(el)el.className='chip'+(v===val?' on':'');});
  } else if(key==='mode'){
    CFG_GROUPS.mode.forEach(v=>{const el=document.getElementById(`cfg-mode-${v}`);if(el)el.className='chip'+(v===val?' on':'');});
  }
}

function exportData(){
  const u=Users.current;
  const name=u?.name||'Shooter';
  exportUserData(DB._uid,name);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.sessions||!Array.isArray(d.sessions))throw new Error('Invalid backup file');
        const existing=DB.sessions;
        const existingIds=new Set(existing.map(s=>s.id));
        const merged=[...existing,...d.sessions.filter(s=>!existingIds.has(s.id))];
        DB.sessions=merged;
        if(d.prefs)DB.prefs=d.prefs;
        toast(`Restored ${d.sessions.length} sessions successfully!`);
        render();
      }catch{toast('Invalid backup file — could not restore');}
    };
    reader.readAsText(f);
  };
  inp.click();
}

async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920}}});
    App.stream=s;App.setState({view:'camera'});
    setTimeout(()=>{const v=document.getElementById('camvid');if(v)v.srcObject=s;},80);
  }catch{toast('Camera unavailable — please upload an image');}
}
function stopCam(){if(App.stream){App.stream.getTracks().forEach(t=>t.stop());App.stream=null;}App.setState({view:'home'});}
function capturePhoto(){
  const v=document.getElementById('camvid');if(!v)return;
  const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(b=>{App.imgUrl=URL.createObjectURL(b);App.stream?.getTracks().forEach(t=>t.stop());App.stream=null;App.setState({view:'configure'});}, 'image/jpeg',.95);
}
function openSession(id){
  const s=DB.sessions.find(s=>s.id===id);if(!s)return;
  App.results=s;App.viewSession=s;App.setState({view:'results'});
}
function delSession(id){DB.del(id);toast('Session deleted');render();}
function confirmClear(){if(confirm('Delete ALL saved sessions? This cannot be undone.')){DB.clear();App.results=null;toast('All sessions cleared');render();}}
function dlImg(url){
  if(!url){toast('No image');return;}
  const filename=`airscan_${Date.now()}.jpg`;
  fetch(url).then(r=>r.blob()).then(blob=>{
    const file=new File([blob],filename,{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({title:'AirScan Pro — Shot Analysis',text:'My shot analysis from AirScan Pro',files:[file]})
        .catch(e=>{if(e.name!=='AbortError')_fallbackDl(url,filename);});
    } else if(navigator.share){
      // Share URL fallback (no file support)
      const objUrl=URL.createObjectURL(blob);
      navigator.share({title:'AirScan Pro — Shot Analysis',url:objUrl})
        .catch(()=>_fallbackDl(url,filename));
    } else {
      _fallbackDl(url,filename);
    }
  }).catch(()=>_fallbackDl(url,filename));
}
function dlCSV(){
  const r=App.results;if(!r?.scored?.length){toast('No data');return;}
  const csv=['Shot,X,Y,Score,Decimal,Distance_px',...r.scored.map(s=>`${s.id},${~~s.cx},${~~s.cy},${s.score},${s.decimal},${s.dist_px.toFixed(1)}`)].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const filename=`airscan_shots_${Date.now()}.csv`;
  const file=new File([blob],filename,{type:'text/csv'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({title:'AirScan Pro — Shot Data',text:'My shot data export from AirScan Pro',files:[file]})
      .catch(e=>{if(e.name!=='AbortError')_fallbackDl(URL.createObjectURL(blob),filename);});
  } else if(navigator.share){
    navigator.share({title:'AirScan Pro — Shot Data',text:csv})
      .catch(()=>_fallbackDl(URL.createObjectURL(blob),filename));
  } else {
    _fallbackDl(URL.createObjectURL(blob),filename);
  }
}
function _fallbackDl(url,filename){
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  toast('File saved!');
}
function printReport(){
  window.print();
}

function openEditor(){
  const r=App.results;if(!r){toast('No session to edit');return;}
  const imgSrc=r.imgUrl||App.imgUrl;
  if(!imgSrc){toast('Original image not available');return;}
  Ed.init(imgSrc,r.scored||[]);
  const img=new Image();
  img.onload=()=>{
    Ed.img=img;Ed.imgW=img.width;Ed.imgH=img.height;
    App.setState({view:'editor'});
  };
  img.onerror=()=>toast('Could not load image for editing');
  img.src=imgSrc;
}

async function applyEdits(){
  if(!Ed.img||!Ed.shots.length){
    toast('Place at least one shot first');return;
  }
  const canvas=document.createElement('canvas');
  canvas.width=Ed.imgW;canvas.height=Ed.imgH;
  canvas.getContext('2d').drawImage(Ed.img,0,0);
  const newScored=scoreShots(Ed.shots,canvas,App.cfg||App.results?.cfg||{});
  const newStats=calcStats(newScored,canvas,App.cfg||App.results?.cfg||{});
  const newOverlay=drawOverlay(canvas,newScored,newStats,App.cfg||App.results?.cfg||{});
  // Keep overlay in memory for immediate display — never written to DB
  App.results={...App.results,scored:newScored,stats:newStats,overlayUrl:newOverlay,pending:false};
  // Strip images before saving — only scores/stats/coords go to localStorage
  const toSave={...App.results,overlayUrl:null,imgUrl:null};
  const sessions=DB.sessions;
  const idx=sessions.findIndex(s=>s.id===toSave.id);
  if(idx>=0){sessions[idx]={...sessions[idx],...toSave};DB.sessions=sessions;}
  else{DB.add(toSave);}
  toast('Shots saved — scores calculated!');
  App.setState({view:'results',viewSession:null});
}


render();
</script>
